name: build

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check parking_motion tests

      - name: Ruff format check
        run: ruff format --check parking_motion tests

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest

  build:
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: parking-motion-windows
            artifact_path: dist/parking-motion-windows-setup.exe
            pyinstaller_icon: installer/icons/app.ico
          - os: macos-latest
            artifact_name: parking-motion-macos
            artifact_path: dist/parking-motion-macos.dmg
            pyinstaller_icon: installer/icons/app.icns
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: >
          pyinstaller --noconfirm --onedir --windowed
          --name parking-motion
          --icon ${{ matrix.pyinstaller_icon }}
          --collect-all PySide6
          --collect-all cv2
          parking_motion/__main__.py

      - name: Install create-dmg
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Build macOS DMG
        if: runner.os == 'macOS'
        run: |
          create-dmg \
            --volname "parking-motion" \
            --volicon installer/icons/app.icns \
            --window-size 500 320 \
            --icon-size 96 \
            --icon "parking-motion.app" 130 160 \
            --app-drop-link 370 160 \
            dist/parking-motion-macos.dmg \
            dist/parking-motion.app

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DAppVersion=$version" installer\parking-motion.iss
          Move-Item installer\parking-motion-windows-setup.exe dist\parking-motion-windows-setup.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/parking-motion-windows/parking-motion-windows-setup.exe
            artifacts/parking-motion-macos/parking-motion-macos.dmg
