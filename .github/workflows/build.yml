name: build

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check parking_motion tests

      - name: Ruff format check
        run: ruff format --check parking_motion tests

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: python -m pytest

  build:
    needs: [lint, test]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: parking-motion-windows
            artifact_path: dist/parking-motion-windows.zip
          - os: macos-latest
            artifact_name: parking-motion-macos
            artifact_path: dist/parking-motion-macos.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: >
          pyinstaller --noconfirm --onedir --windowed
          --name parking-motion
          --collect-all PySide6
          --collect-all cv2
          parking_motion/__main__.py

      - name: Pack macOS .app bundle
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent --sequesterRsrc dist/parking-motion.app dist/parking-motion-macos.zip

      - name: Pack Windows folder
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/parking-motion -DestinationPath dist/parking-motion-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/parking-motion-windows/parking-motion-windows.zip
            artifacts/parking-motion-macos/parking-motion-macos.zip
